name: Pip Download Wheels and Release

on:
  workflow_dispatch:
    inputs:
      pip_command:
        description: '输入 pip download 命令，例如: pip download requests numpy'
        required: true
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p wheelhouse
          mkdir -p output_folder

      - name: Parse pip command and download wheels
        id: download
        run: |
          CMD="${{ inputs.pip_command }}"

          # 删除开头的 "pip download"
          PACKAGES=$(echo "$CMD" | sed 's/^pip[ ]\+download[ ]*//')

          echo "准备下载:"
          echo "$PACKAGES"

          python -m pip install --upgrade pip

          pip download $PACKAGES \
            --dest wheelhouse \
            --only-binary=:all: \
            --platform win_amd64 \
            --python-version 312 \
            --implementation cp \
            --abi cp312

          echo "下载完成:"
          ls -lh wheelhouse

          FIRST_FILE=$(ls wheelhouse | head -n 1)
          SAFE_NAME=$(echo "$FIRST_FILE" | sed 's/[^a-zA-Z0-9._-]/_/g')

          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Zip and split into 2 parts
        run: |
          cd wheelhouse

          FILE_SIZE_BYTES=$(du -sb . | cut -f1)
          HALF_SIZE_MB=$(( (FILE_SIZE_BYTES / 1024 / 1024 / 2) + 1 ))

          ZIP_NAME="../output_folder/wheels.zip"

          echo "总大小: $FILE_SIZE_BYTES bytes"
          echo "每卷大小: ${HALF_SIZE_MB} MB"

          zip -r -s ${HALF_SIZE_MB}m "$ZIP_NAME" .

          echo "压缩完成:"
          ls -lh ../output_folder

      - name: Generate timestamp
        id: time
        run: echo "time=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wheels-${{ steps.time.outputs.time }}
          name: Python Wheels for Windows 11 Py3.12
          body: |
            **输入命令**
            `${{ inputs.pip_command }}`

            **目标平台**
            Windows 11 x64 / Python 3.12

            **压缩方式**
            固定分成 2 卷
          files: output_folder/*