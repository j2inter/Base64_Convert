name: Pip Download Wheels (Win11 Py3.12) and Release

on:
  workflow_dispatch:
    inputs:
      pip_command:
        description: '输入 pip download 命令，例如: pip download torch torchvision --index-url https://download.pytorch.org/whl/cu130'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p wheelhouse
          mkdir -p output

      - name: Parse and download wheels
        id: download
        run: |
          CMD="${{ inputs.pip_command }}"

          # 去掉 pip download 前缀
          ARGS=$(echo "$CMD" | sed 's/^pip[ ]\+download[ ]*//')

          echo "执行参数:"
          echo "$ARGS"

          python -m pip install --upgrade pip

          pip download $ARGS \
            --dest wheelhouse \
            --only-binary=:all: \
            --platform win_amd64 \
            --python-version 312 \
            --implementation cp \
            --abi cp312

          echo "下载完成:"
          ls -lh wheelhouse

          FIRST_FILE=$(ls wheelhouse | head -n 1)
          SAFE_NAME=$(echo "$FIRST_FILE" | sed 's/[^a-zA-Z0-9._-]/_/g')

          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Zip and force split into 2 parts
        run: |
          cd wheelhouse

          # 先打完整 zip
          zip -r ../output/wheels.zip .

          cd ../output

          FILE_SIZE=$(stat -c%s wheels.zip)
          HALF_SIZE=$(( (FILE_SIZE / 2) + 1 ))

          echo "总大小: $FILE_SIZE bytes"
          echo "每卷大小: $HALF_SIZE bytes"

          split -b $HALF_SIZE -d -a 1 wheels.zip wheels.zip.part

          rm wheels.zip

          echo "最终文件:"
          ls -lh

      - name: Generate timestamp
        id: time
        run: echo "time=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wheels-${{ steps.download.outputs.safe_name }}-${{ steps.time.outputs.time }}
          name: Python Wheels (Win11 Py3.12)
          body: |
            **输入命令**
            ```
            ${{ inputs.pip_command }}
            ```

            **目标平台**
            Windows 11 x64 / Python 3.12

            **说明**
            - 已强制仅下载 wheel
            - 自动分成 2 个压缩分卷
          files: output/*