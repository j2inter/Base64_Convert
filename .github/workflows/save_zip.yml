name: 下載並壓縮 PyCharm
on: 
  workflow_dispatch: # 讓你可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下載 PyCharm 安裝包
        run: |
          # 使用 -L 處理跳轉，-# 顯示進度條
          curl -L "https://download-cdn.jetbrains.com/python/pycharm-2026.1.1.exe" -o pycharm.exe
      - name: 
        run: |
            zip pycharm_archive.zip pycharm.exe

       - name: 上傳成品 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pycharm-zip-package
          path: pycharm_archive.zip
