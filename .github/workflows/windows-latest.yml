name: windows Download WHL → 7z Split → Release

on:
  workflow_dispatch:
    inputs:
      pip_args:
        description: '完整 pip 命令'
        required: true
        default: 'pip download numpy pandas'
      release_tag:
        required: true
        default: 'whl-20260501'
      release_name:
        required: false
        default: 'WHL 下载包'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip wheel setuptools

      - run: mkdir download

      # ✅ 执行 pip + log
      - name: Run pip
        shell: pwsh
        run: |
          $log = "download\pip-command.txt"

          "COMMAND:" | Out-File $log
          "${{ inputs.pip_args }}" | Out-File $log -Append

          cd download
          ${{ inputs.pip_args }} 2>&1 | Tee-Object pip.log

      - run: dir download
        shell: pwsh

      - name: Install 7zip
        run: choco install 7zip -y

      # 🔥 核心：7z 原生分卷（不会出现 .zip.001）
      - name: Create 7z split archive
        shell: pwsh
        run: |
          $tag = "${{ inputs.release_tag }}"
          $archive = "whl-packages-$tag.7z"

          $total = (Get-ChildItem -Recurse download | Measure Length -Sum).Sum
          $partMB = [math]::Ceiling(($total / 2) / 1MB)

          echo "Total: $total"
          echo "Split size: $partMB MB"

          # ⭐ 关键：7z 原生格式（不是 zip）
          & 7z a $archive ".\download\*" "-v${partMB}m" -mx=5

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          files: |
            whl-packages-${{ inputs.release_tag }}.7z*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}