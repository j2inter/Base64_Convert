name: Windows Download WHL → ZIP → Release

on:
  workflow_dispatch:
    inputs:
      pip_args:
        description: '完整 pip 命令'
        required: true
        default: 'pip download numpy pandas'
      release_tag:
        required: true
        default: 'whl-20260501'
      release_name:
        required: false
        default: 'WHL 下载包'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip wheel setuptools

      - run: mkdir download

      # ✅ 执行 pip + 记录日志
      - name: Run pip
        shell: pwsh
        run: |
          $logFile = "download\pip-command.txt"

          echo "COMMAND:" | Out-File $logFile
          echo "${{ inputs.pip_args }}" | Out-File $logFile -Append
          echo "" | Out-File $logFile -Append
          echo "TIME:" | Out-File $logFile -Append
          echo (Get-Date) | Out-File $logFile -Append

          cd download
          ${{ inputs.pip_args }} 2>&1 | Tee-Object pip-output.log

      - run: dir download
        shell: pwsh

      - name: Install 7zip
        run: choco install 7zip -y

      # ✅ 用 cmd 强制标准 zip 分卷
      - name: Compress (REAL zip split)
        shell: cmd
        run: |
          set TAG=${{ inputs.release_tag }}
          set ZIP=whl-packages-%TAG%.zip

          REM 计算大小（用 powershell）
          for /f %%i in ('powershell -command "(Get-ChildItem -Recurse download | Measure Length -Sum).Sum"') do set SIZE=%%i

          REM 除以2（字节转MB）
          for /f %%i in ('powershell -command "[math]::Ceiling(%SIZE%/2/1MB)"') do set PART=%%i

          echo Total size: %SIZE%
          echo Each part: %PART% MB

          REM ⭐关键：cmd + 明确字符串 → 标准 zip 分卷
          7z a -tzip "%ZIP%" ".\download\*" -v%PART%m

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          files: |
            whl-packages-${{ inputs.release_tag }}.zip*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}