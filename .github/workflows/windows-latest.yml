name: windows Download WHL → ZIP → Release

on:
  workflow_dispatch:
    inputs:
      pip_args:
        description: '完整 pip 命令（例如：pip install numpy 或 pip download pandas）'
        required: true
        default: 'pip download numpy pandas'
      release_tag:
        description: 'Release Tag（建议格式：whl-20260501）'
        required: true
        default: 'whl-20260501'
      release_name:
        description: 'Release 显示名称'
        required: false
        default: 'WHL 下载包'

jobs:
  download-and-package:
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Create download directory
        run: mkdir download

      # ✅ 完全尊重用户输入
      - name: Run custom pip command
        run: |
          echo "Executing: ${{ inputs.pip_args }}"
          cd download
          ${{ inputs.pip_args }}
        shell: pwsh

      - name: List downloaded files
        run: dir .\download
        shell: pwsh

      # ✅ 安装 7zip
      - name: Install 7-Zip
        run: choco install 7zip -y

      # ✅ 分成 2 份（动态计算）
      - name: Compress with split ZIP (2 parts)
        run: |
          $tag = "${{ inputs.release_tag }}"
          $baseName = "whl-packages-$tag.zip"

          # 计算总大小
          $totalSize = (Get-ChildItem -Recurse ./download | Measure-Object -Property Length -Sum).Sum

          if ($totalSize -eq $null -or $totalSize -eq 0) {
            Write-Error "download 目录为空，无法压缩"
            exit 1
          }

          # 每份大小（2份）
          $partSize = [math]::Ceiling($totalSize / 2)

          # 转 MB
          $partSizeMB = [math]::Ceiling($partSize / 1MB)

          echo "Total size: $totalSize bytes"
          echo "Each part: $partSizeMB MB"

          # 标准 ZIP 分卷
          7z a -tzip $baseName .\download\* -v${partSizeMB}m

          echo "ZIP_BASE=$baseName" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      # ✅ 上传所有分卷
      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            whl-packages-${{ inputs.release_tag }}.zip*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}