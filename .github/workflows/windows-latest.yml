name: windows Download WHL → ZIP → Release

on:
  workflow_dispatch:
    inputs:
      pip_args:
        description: 'pip download 后面的完整参数（支持空格、--extra-index-url 等）'
        required: true
        default: 'numpy pandas'
      release_tag:
        description: 'Release Tag（建议格式：whl-20260501）'
        required: true
        default: 'whl-20260501'
      release_name:
        description: 'Release 显示名称'
        required: false
        default: 'WHL 下载包'

jobs:
  download-and-package:
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: write        # 修复 403 错误的关键

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Create download directory
        run: mkdir download

      - name: Run pip download with your parameters
        run: |
          echo "Executing: python -m pip download ${{ inputs.pip_args }} -d ./download"
          python -m pip download ${{ inputs.pip_args }} -d ./download
        shell: pwsh

      - name: List downloaded files
        run: dir .\download
        shell: pwsh

      - name: Generate ZIP filename and compress
        run: |
          $tag = "${{ inputs.release_tag }}"
          $zipName = "whl-packages-${tag}.zip"
          Compress-Archive -Path .\download\* -DestinationPath $zipName -Force
          echo "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.ZIP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}