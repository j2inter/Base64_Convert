name: Runner Specs (Mobile Friendly)

on: workflow_dispatch

jobs:
  get-specs:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: CPU & RAM Info
        shell: bash
        run: |
          echo "---------------------------------------"
          echo "  >>> OS: $RUNNER_OS SPEC <<<"
          echo "---------------------------------------"
          
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "[CPU]"
            lscpu | grep -E "Model name|CPU\(s\)"
            echo -e "\n[Memory]"
            free -h | awk 'NR==1 || NR==2'
            
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "[CPU]"
            sysctl -n machdep.cpu.brand_string
            echo "Cores: $(sysctl -n hw.ncpu)"
            echo -e "\n[Memory]"
            echo "Total: $(($(sysctl -n hw.memsize) / 1024**3)) GB"
            
          else
            echo "Skipping Bash for Windows hardware info..."
          fi

      - name: Windows Hardware (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "---------------------------------------" -ForegroundColor Cyan
          Write-Host "  >>> WINDOWS HARDWARE INFO <<<"
          Write-Host "---------------------------------------"
          Write-Host "[CPU]"
          Get-CimInstance Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors | Format-List
          Write-Host "[Memory]"
          $mem = Get-CimInstance Win32_OperatingSystem
          $total = [math]::round($mem.TotalVisibleMemorySize / 1MB, 2)
          $free = [math]::round($mem.FreePhysicalMemory / 1MB, 2)
          Write-Host "Total: $total GB"
          Write-Host "Free:  $free GB"

      - name: Disk & Software
        shell: bash
        run: |
          echo "---------------------------------------"
          echo "  >>> DISK & TOOLS <<<"
          echo "---------------------------------------"
          echo "[Disk Space]"
          df -h . | awk 'NR==1 || NR==2'
          
          echo -e "\n[Versions]"
          printf "Node:   %-10s\n" "$(node -v)"
          printf "Python: %-10s\n" "$(python3 -V | awk '{print $2}')"
          printf "Docker: %-10s\n" "$(docker -v | awk '{print $3}' | sed 's/,//')"
