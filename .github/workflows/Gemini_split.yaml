name: 下载URL并分成2份标准ZIP

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '要下载的文件完整 URL'
        required: true
        type: string
      release_tag:
        description: 'Release Tag（例如 v20260430）'
        required: true
        default: 'latest'
        type: string

jobs:
  split-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download file
        run: |
          URL="${{ inputs.download_url }}"
          # 提取原始文件名，处理掉 URL 后面的参数
          ORIGINAL_NAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
          
          # 防止提取失败给个默认兜底
          if [ -z "$ORIGINAL_NAME" ]; then ORIGINAL_NAME="downloaded_file"; fi
          
          echo "original_name=$ORIGINAL_NAME" >> $GITHUB_ENV
          echo "正在下载: $ORIGINAL_NAME"

          # 直接将文件下载并保存为原始文件名，这样解压出来的文件才带正确后缀
          wget --show-progress "$URL" -O "$ORIGINAL_NAME"

      - name: Create standard 2-part ZIP (Bandizip 友好)
        run: |
          BASE_NAME="${{ env.original_name }}"
          # 获取原始文件大小（字节）
          FILE_SIZE=$(stat -c %s "$BASE_NAME")
          
          # 转换为 MB
          FILE_SIZE_MB=$(( FILE_SIZE / 1024 / 1024 ))
          echo "原始文件大小: $FILE_SIZE_MB MB"

          # 兜底逻辑：如果文件小于 2MB，直接普通压缩不分卷，避免触发 zip -s 的最小体积限制
          if [ "$FILE_SIZE_MB" -lt 2 ]; then
            echo "文件较小，跳过分卷，直接压缩。"
            zip -9 "${BASE_NAME}.zip" "$BASE_NAME"
          else
            # 计算一半大小（MB），并 +1 向上取整，确保严格分成 2 份而不是因除法丢失精度变成 3 份
            HALF_SIZE_MB=$(( (FILE_SIZE_MB / 2) + 1 ))
            echo "准备分成2份，每卷最大限制约为 $HALF_SIZE_MB MB"

            # 使用 m 作为单位进行分卷
            zip -9 -s ${HALF_SIZE_MB}m "${BASE_NAME}.zip" "$BASE_NAME"
          fi

          echo "生成的文件列表："
          ls -lh "${BASE_NAME}.z"* || echo "文件查找失败"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "2-Part ZIP - ${{ inputs.release_tag }}"
          draft: false
          prerelease: false
          # 使用通配符捕获所有可能的分卷文件后缀 (.zip, .z01, .z02 等)
          files: |
            *.zip
            *.z*
          token: ${{ secrets.GITHUB_TOKEN }}

