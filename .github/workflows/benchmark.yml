name: Ultimate Node Benchmark (ModelScope Edition)

on: 
  workflow_dispatch:

jobs:
  node-bench:
    name: "🚀 ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install numpy psutil py-cpuinfo requests

      - name: Run Comprehensive Benchmark
        shell: python
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          import numpy as np
          import time
          import sys
          import io
          import psutil
          import cpuinfo
          import requests
          from concurrent.futures import ThreadPoolExecutor

          if sys.platform == "win32":
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')

          def separator(title):
              print(f"\n{'═'*20} {title} {'═'*20}")

          # --- 1. 硬件审计 ---
          separator("🖥️ 硬件规格")
          info = cpuinfo.get_cpu_info()
          print(f"CPU: {info.get('brand_raw')} ({psutil.cpu_count()} vCPUs)")
          print(f"RAM: {psutil.virtual_memory().total / (1024**3):.2f} GB")

          # --- 2. ModelScope 下载测试 ---
          separator("🌐 ModelScope 带宽测试")
          # 目标：Gemma-4 GGUF 模型文件
          TARGET_URL = "https://modelscope.cn/models/unsloth/gemma-4-E2B-it-GGUF/resolve/master/mmproj-F16.gguf"
          
          def download_chunk(url, start, end, duration=10, stop_time=0):
              total = 0
              try:
                  headers = {'Range': f'bytes={start}-{end}'}
                  with requests.get(url, headers=headers, stream=True, timeout=10) as r:
                      for chunk in r.iter_content(chunk_size=1024*512):
                          if time.time() > stop_time:
                              break
                          if chunk:
                              total += len(chunk)
              except:
                  pass
              return total

          net_results = []
          for i in range(1, 4):
              print(f"▶️  网络下载 第 {i} 轮 (10s并发压榨)...", end="", flush=True)
              start_t = time.perf_counter()
              stop_t = time.time() + 10
              
              # 开启 8 线程并发下载不同的 range，模拟真实高带宽拉取
              chunk_size = 50 * 1024 * 1024 # 50MB 偏移
              with ThreadPoolExecutor(max_workers=8) as executor:
                  futures = [
                      executor.submit(download_chunk, TARGET_URL, j*chunk_size, (j+1)*chunk_size, stop_time=stop_t) 
                      for j in range(8)
                  ]
                  cycle_bytes = sum(f.result() for f in futures)
              
              actual_duration = time.perf_counter() - start_t
              mbps = (cycle_bytes * 8) / (1024 * 1024) / actual_duration
              net_results.append(mbps)
              print(f" 完成! 速度: {mbps:.2f} Mbps (约 {mbps/8:.2f} MB/s)")
              if i < 3: 
                  print(f"💤 冷却 5s...")
                  time.sleep(5)

          # --- 3. CPU 运算测试 ---
          separator("🧠 CPU 矩阵运算测试")
          size = 4000
          a = np.random.randn(size, size).astype(np.float32)
          b = np.random.randn(size, size).astype(np.float32)
          cpu_results = []
          for i in range(1, 4):
              print(f"▶️  CPU 测试 第 {i} 轮...", end="", flush=True)
              cnt = 0
              end_t = time.time() + 10
              while time.time() < end_t:
                  np.dot(a, b); cnt += 1
              cpu_results.append(cnt / 10)
              print(f" 完成! {cnt/10:.2f} ops/s")
              if i < 3: time.sleep(5)

          # --- 4. 汇总 ---
          separator("📊 最终结论")
          avg_net = sum(net_results)/3
          avg_cpu = sum(cpu_results)/3
          print(f"平台: {sys.platform}")
          print(f"ModelScope 平均带宽: {avg_net:.2f} Mbps")
          print(f"CPU 矩阵运算平均性能: {avg_cpu:.2f} ops/s")
          print(f"综合表现评分: {(avg_net / 100) + (avg_cpu * 10):.2f}")
          separator("测试结束")
