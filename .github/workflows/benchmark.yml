name: Ultimate Node Benchmark

on: 
  workflow_dispatch:

jobs:
  node-bench:
    name: "🚀 ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install numpy psutil py-cpuinfo requests

      - name: Run Comprehensive Benchmark
        shell: python
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          import numpy as np
          import time
          import sys
          import io
          import psutil
          import cpuinfo
          import requests
          from concurrent.futures import ThreadPoolExecutor

          # 编码修复
          if sys.platform == "win32":
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')

          def separator(title):
              print(f"\n{'═'*20} {title} {'═'*20}")

          # --- 1. 硬件审计 ---
          separator("🖥️ 硬件规格")
          info = cpuinfo.get_cpu_info()
          print(f"CPU: {info.get('brand_raw')} ({psutil.cpu_count()} vCPUs)")
          print(f"RAM: {psutil.virtual_memory().total / (1024**3):.2f} GB")

          # --- 2. 网络下载测试 (重点) ---
          separator("🌐 网络带宽测试 (Global CDN)")
          # 使用高带宽测速文件链接
          TEST_URLS = [
              "https://releases.ubuntu.com/22.04/ubuntu-22.04.4-desktop-amd64.iso", # Canonical
              "https://speed.cloudflare.com/__down?bytes=1073741824",               # Cloudflare
              "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/latest?browser=Edge" # Microsoft
          ]

          def download_worker(url, duration=10):
              total_bytes = 0
              start_t = time.time()
              try:
                  with requests.get(url, stream=True, timeout=5) as r:
                      for chunk in r.iter_content(chunk_size=1024*256):
                          if time.time() > start_t + duration:
                              break
                          if chunk:
                              total_bytes += len(chunk)
              except:
                  pass
              return total_bytes

          net_results = []
          for i in range(1, 4):
              print(f"▶️  网络测试 第 {i} 轮 (10s并发下载)...", end="", flush=True)
              start_t = time.perf_counter()
              
              # 开启多线程模拟真实带宽压榨
              with ThreadPoolExecutor(max_workers=4) as executor:
                  futures = [executor.submit(download_worker, url) for url in TEST_URLS]
                  cycle_bytes = sum(f.result() for f in futures)
              
              actual_duration = time.perf_counter() - start_t
              mbps = (cycle_bytes * 8) / (1024 * 1024) / actual_duration
              net_results.append(mbps)
              print(f" 完成! 速度: {mbps:.2f} Mbps")
              if i < 3: time.sleep(5)

          # --- 3. CPU 运算测试 (保留对比) ---
          separator("🧠 CPU 矩阵运算测试")
          size = 4000
          a = np.random.randn(size, size).astype(np.float32)
          b = np.random.randn(size, size).astype(np.float32)
          cpu_results = []
          for i in range(1, 4):
              print(f"▶️  CPU 测试 第 {i} 轮...", end="", flush=True)
              cnt = 0
              end_t = time.time() + 10
              while time.time() < end_t:
                  np.dot(a, b); cnt += 1
              cpu_results.append(cnt / 10)
              print(f" 完成! {cnt/10:.2f} ops/s")
              if i < 3: time.sleep(5)

          # --- 4. 汇总 ---
          separator("📊 最终结论")
          print(f"平台: {sys.platform}")
          print(f"平均下载速度: {sum(net_results)/3:.2f} Mbps (约 {sum(net_results)/24:.2f} MB/s)")
          print(f"平均计算性能: {sum(cpu_results)/3:.2f} ops/s")
          print(f"网络波动率: {(max(net_results)-min(net_results))/(sum(net_results)/3)*100:.2f}%")
