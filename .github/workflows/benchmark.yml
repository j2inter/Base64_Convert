name: Pure Python Benchmark

on: 
  workflow_dispatch:

jobs:
  python-speed-test:
    name: "🐍 ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Benchmark Script
        shell: python
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          import time
          import sys
          import hashlib
          import os
          import io
          import pathlib

          # 解决 Windows Emoji 编码问题
          if sys.platform == "win32":
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')

          def separator():
              print("-" * 40)

          print(f"🚀 开始基准测试 | 平台: {sys.platform} | 版本: {sys.version}")
          
          # --- 1. 计算性能测试 (CPU) ---
          # 逻辑：进行 500 万次迭代的 SHA256 哈希计算
          separator()
          print("🧠 测试 1: CPU 计算能力 (SHA256 密集计算)...")
          start_time = time.perf_counter()
          data = b"Gemini benchmark data" * 100
          for _ in range(5_000_000):
              hashlib.sha256(data).hexdigest()
          cpu_duration = time.perf_counter() - start_time
          print(f"✅ 完成！耗时: {cpu_duration:.2f} 秒")

          # --- 2. 磁盘 IO 测试 (Disk) ---
          # 逻辑：写入并读取一个 500MB 的临时文件
          separator()
          print("💾 测试 2: 磁盘 IO 性能 (500MB 读写)...")
          test_file = pathlib.Path("io_test.bin")
          content = os.urandom(1024 * 1024) # 1MB 随机数据
          
          start_time = time.perf_counter()
          # 写入
          with open(test_file, "wb") as f:
              for _ in range(500):
                  f.write(content)
          # 读取
          with open(test_file, "rb") as f:
              while f.read(1024 * 1024):
                  pass
          io_duration = time.perf_counter() - start_time
          if test_file.exists(): test_file.unlink()
          print(f"✅ 完成！耗时: {io_duration:.2f} 秒")

          # --- 3. 内存分配测试 (RAM) ---
          # 逻辑：快速创建并销毁大量列表对象
          separator()
          print("⚡ 测试 3: 内存管理 (大量对象创建)...")
          start_time = time.perf_counter()
          container = []
          for i in range(10_000_000):
              container.append(i)
          container.clear()
          mem_duration = time.perf_counter() - start_time
          print(f"✅ 完成！耗时: {mem_duration:.2f} 秒")

          # --- 汇总结果 ---
          separator()
          print(f"📊 最终结果汇总 (${{ matrix.os }}):")
          print(f"CPU: {cpu_duration:.2f}s | IO: {io_duration:.2f}s | MEM: {mem_duration:.2f}s")
          print(f"总计得分 (越低越快): {cpu_duration + io_duration + mem_duration:.2f}s")
          separator()
