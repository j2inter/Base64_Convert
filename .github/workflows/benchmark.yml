name: Granular Data Porter (Universal Python Edition)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 下载链接 (逗号或分号分隔)'
        required: true
        type: string
      split_size_mb:
        description: '📦 分卷大小 (单位: MB)'
        required: true
        default: '2000'

jobs:
  benchmark:
    name: "🏁 竞速: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 0. Checkout Repository
        uses: actions/checkout@v4

      - name: 1. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 2. Install Tools (Native)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y aria2 p7zip-full
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install aria2 p7zip
          else
            choco install aria2 7zip -y --no-progress
          fi

      - name: 3. Execute Python Core Engine
        shell: python
        run: |
          import os
          import subprocess
          import sys
          import pathlib
          import shutil

          # --- 1. 参数解析 ---
          urls_raw = """${{ inputs.urls }}"""
          split_mb = int("${{ inputs.split_size_mb }}")
          
          # 计算字节 (GitHub 极限是 2147483647 字节)
          GH_LIMIT = 2147483647
          calc_bytes = split_mb * 1024 * 1024
          final_bytes = f"{min(calc_bytes, GH_LIMIT)}b"
          
          print(f"🚀 启动任务 | 平台: {sys.platform} | 分卷大小: {final_bytes}")

          # --- 2. 准备目录 ---
          curr_dir = pathlib.Path.cwd()
          dl_dir = curr_dir / "dl_tmp"
          out_dir = curr_dir / "output_folder"
          dl_dir.mkdir(exist_ok=True)
          out_dir.mkdir(exist_ok=True)

          # --- 3. 下载文件 ---
          urls = [u.strip() for u in urls_raw.replace(';', ',').split(',') if u.strip()]
          list_file = dl_dir / "list.txt"
          list_file.write_text("\n".join(urls))
          
          print("📡 正在拉取数据...")
          aria_cmd = ["aria2c", "-i", str(list_file), "-x", "16", "-s", "16", "-d", str(dl_dir)]
          subprocess.run(aria_cmd, check=True)

          # --- 4. 寻找 7z 命令 ---
          # Windows 通常是 7z, macOS/Linux 可能是 7z 或 7za
          z_cmd = shutil.which("7z") or shutil.which("7za")
          if not z_cmd:
              # Windows 特殊处理：如果 choco 没写进 PATH，尝试默认路径
              win_path = r"C:\Program Files\7-Zip\7z.exe"
              z_cmd = win_path if os.path.exists(win_path) else "7z"

          # --- 5. 压缩与切割 ---
          for file_path in dl_dir.iterdir():
              if file_path.is_file() and file_path.name != "list.txt":
                  print(f"📦 正在处理: {file_path.name}")
                  # 构建 7z 命令
                  # a: 压缩, -v: 分卷, -mx1: 极速, -mmt=on: 多线程
                  archive_out = out_dir / f"{file_path.name}.7z"
                  cmd = [
                      z_cmd, "a", 
                      f"-v{final_bytes}", 
                      "-mx1", "-mmt=on", 
                      str(archive_out), str(file_path)
                  ]
                  subprocess.run(cmd, check=True)
                  print(f"✅ {file_path.name} 处理完成")

      - name: 4. Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Bench-${{ matrix.os }}-${{ github.run_id }}"
          name: "📊 性能报告: ${{ matrix.os }}"
          files: output_folder/*
