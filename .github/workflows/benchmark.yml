name: PyTorch CPU Performance Benchmark

on: 
  workflow_dispatch:

jobs:
  torch-bench:
    name: "🔥 Torch: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install torch psutil py-cpuinfo

      - name: Run PyTorch Audit & Stress Test
        shell: python
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          import torch
          import time
          import psutil
          import cpuinfo
          import sys
          import io

          # 编码修复
          if sys.platform == "win32":
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')

          # --- 1. 硬件审计 ---
          info = cpuinfo.get_cpu_info()
          print(f"╔{'═'*50}╗")
          print(f"║ 硬件审计: {info.get('brand_raw')} ║")
          print(f"║ 核心数: {psutil.cpu_count(logical=False)}核/{psutil.cpu_count(logical=True)}线程 | PyTorch线程: {torch.get_num_threads()} ║")
          print(f"╚{'═'*50}╝\n")

          # --- 2. 压力测试逻辑 ---
          # 创建两个 4000x4000 的大矩阵进行乘法运算
          size = 4000
          a = torch.randn(size, size)
          b = torch.randn(size, size)

          results = []
          
          for i in range(1, 4):
              print(f"🚀 第 {i} 轮测试开始 (持续10秒)...")
              count = 0
              start_time = time.time()
              end_time = start_time + 10
              
              while time.time() < end_time:
                  # 执行矩阵乘法 (核心压力)
                  torch.mm(a, b)
                  count += 1
              
              duration = time.time() - start_time
              ops_per_sec = count / duration
              results.append(ops_per_sec)
              
              print(f"✅ 第 {i} 轮完成: {ops_per_sec:.2f} 矩阵运算/秒")
              
              if i < 3:
                  print(f"💤 休息 5 秒以冷却 (防止降频影响)...")
                  time.sleep(5)

          # --- 3. 汇总分析 ---
          avg_ops = sum(results) / len(results)
          variation = (max(results) - min(results)) / avg_ops * 100
          
          print(f"\n{'📊'*15}")
          print(f"平台: {sys.platform}")
          print(f"平均性能: {avg_ops:.2f} ops/s")
          print(f"波动幅度: {variation:.2f}%")
          print(f"{'📊'*15}")
