name: Professional Hardware Audit (PyPI Enhanced)

on: 
  workflow_dispatch:

jobs:
  advanced-audit:
    name: "🛠️ Audit: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install psutil py-cpuinfo

      - name: Run Deep Audit & Benchmark
        shell: python
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          import psutil
          import cpuinfo
          import platform
          import os
          import sys
          import time
          import hashlib
          import io

          # 编码修复
          if sys.platform == "win32":
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')

          def print_box(title, content_dict):
              print(f"\n╔{'═' * 50}╗")
              print(f"║ {title.center(48)} ║")
              print(f"╠{'═' * 50}╣")
              for k, v in content_dict.items():
                  print(f"║ {k:<20} : {v:<25} ║")
              print(f"╚{'═' * 50}╝")

          # --- 1. 深度 CPU 审计 ---
          info = cpuinfo.get_cpu_info()
          cpu_data = {
              "Brand": info.get('brand_raw', 'Unknown'),
              "Architecture": info.get('arch', 'Unknown'),
              "Cores (Phys/Log)": f"{psutil.cpu_count(logical=False)} / {psutil.cpu_count(logical=True)}",
              "Frequency": f"{info.get('hz_actual_friendly', 'Unknown')}",
              "L2 Cache": f"{info.get('l2_cache_size', 'Unknown')} bytes",
              "L3 Cache": f"{info.get('l3_cache_size', 'Unknown')} bytes"
          }
          print_box("CPU 详细规格", cpu_data)

          # --- 2. 内存与存储审计 ---
          mem = psutil.virtual_memory()
          disk = psutil.disk_usage('/')
          mem_data = {
              "Total RAM": f"{mem.total / (1024**3):.2f} GB",
              "Available RAM": f"{mem.available / (1024**3):.2f} GB",
              "Disk Total": f"{disk.total / (1024**3):.2f} GB",
              "Disk Free": f"{disk.free / (1024**3):.2f} GB",
              "OS Type": platform.system(),
              "Kernel": platform.release()
          }
          print_box("内存与存储详情", mem_data)

          # --- 3. 极速性能基准 (单核) ---
          print("\n" + "⚡ 正在进行单核 SHA256 竞速 (5,000,000次)...")
          start = time.perf_counter()
          test_data = b"benchmark" * 100
          for _ in range(5_000_000):
              hashlib.sha256(test_data).digest()
          duration = time.perf_counter() - start
          
          # 计算一个参考分值 (假设 Linux 基准为 100)
          score = 100 / duration 
          print(f"🏁 完成时间: {duration:.3f} 秒")
          print(f"📈 相对性能分值: {score:.2f}")
