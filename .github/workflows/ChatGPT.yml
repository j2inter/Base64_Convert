name: Download, Split into 2 Parts and Release

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '多个 URL，用逗号或分号分隔'
        required: true
        type: string

jobs:
  process-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p dl_folder
          mkdir -p output_folder

      - name: Download files
        id: download
        run: |
          cd dl_folder

          URLS="${{ inputs.urls }}"

          # 把逗号和分号统一转成换行
          echo "$URLS" | tr ',;' '\n' | while read -r url; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue

            echo "开始下载: $url"
            wget --content-disposition --trust-server-names "$url"
          done

          echo "下载完成:"
          ls -lh

          FIRST_FILE=$(ls -1 | head -n 1)
          SAFE_NAME=$(echo "$FIRST_FILE" | sed 's/[^a-zA-Z0-9._-]/_/g')

          echo "first_file=$FIRST_FILE" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Split each file into 2 parts
        run: |
          cd dl_folder

          for file in *; do
            [ -f "$file" ] || continue

            SAFE_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')

            FILE_SIZE_BYTES=$(stat -c%s "$file")
            HALF_SIZE_MB=$(( (FILE_SIZE_BYTES / 1024 / 1024 / 2) + 1 ))

            ZIP_NAME="../output_folder/${SAFE_NAME}.zip"

            echo "文件: $file"
            echo "总大小: $FILE_SIZE_BYTES bytes"
            echo "每卷大小: ${HALF_SIZE_MB} MB"

            zip -s ${HALF_SIZE_MB}m "$ZIP_NAME" "$file"
          done

          echo "生成结果:"
          ls -lh ../output_folder/

      - name: Generate timestamp
        id: time
        run: echo "time=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.download.outputs.safe_name }}-${{ steps.time.outputs.time }}
          name: Batch Download Release
          body: |
            **下载链接**
            `${{ inputs.urls }}`

            **压缩方式**
            每个文件固定分成 2 个卷
          files: output_folder/*