name: Download, Split and Release

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '每行一个下载 URL'
        required: true
        type: string
      split_size:
        description: '分卷大小 (单位: MB)'
        required: true
        default: '50'
        type: string

jobs:
  process-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p dl_folder
          mkdir -p output_folder

      - name: Download files
        id: download
        run: |
          cd dl_folder

          FIRST_SAFE_NAME=""
          FIRST_FILE_NAME=""

          while IFS= read -r url; do
            [ -z "$url" ] && continue

            echo "开始下载: $url"
            wget --content-disposition --trust-server-names "$url"

          done << 'EOF'
          ${{ inputs.urls }}
          EOF

          echo "下载完成:"
          ls -lh

          FILE_LIST=$(ls -1)

          FIRST_FILE_NAME=$(echo "$FILE_LIST" | head -n 1)
          FIRST_SAFE_NAME=$(echo "$FIRST_FILE_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')

          echo "first_file_name=$FIRST_FILE_NAME" >> $GITHUB_OUTPUT
          echo "first_safe_name=$FIRST_SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Zip and split each file
        run: |
          cd dl_folder

          for file in *; do
            [ -f "$file" ] || continue

            SAFE_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')
            ZIP_NAME="../output_folder/${SAFE_NAME}.zip"

            echo "压缩并分卷: $file"
            zip -s ${{ inputs.split_size }}m "$ZIP_NAME" "$file"
          done

          echo "生成文件:"
          ls -lh ../output_folder/

      - name: Generate timestamp
        id: time
        run: echo "time=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.download.outputs.first_safe_name }}-${{ steps.time.outputs.time }}
          name: Batch Download Release
          body: |
            **下载链接列表:**
            ```
            ${{ inputs.urls }}
            ```

            **分卷大小:** `${{ inputs.split_size }} MB`
          files: output_folder/*