name: Download + Standard 2-Part ZIP

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '要下载的文件完整 URL'
        required: true
        type: string
      release_tag:
        description: 'Release Tag（例如 v20260430）'
        required: true
        default: 'latest'
        type: string

jobs:
  split-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download file
        run: |
          URL="${{ inputs.download_url }}"
          ORIGINAL_NAME=$(basename "$URL" | cut -d'?' -f1 | cut -d'#' -f1)
          
          echo "original_name=$ORIGINAL_NAME" >> $GITHUB_ENV
          echo "正在下载: $ORIGINAL_NAME"

          wget -q --show-progress "$URL" -O downloaded_file
          echo "下载完成，大小: $(du -h downloaded_file | cut -f1)"

      - name: Create standard 2-part ZIP (Bandizip 友好格式)
        run: |
          BASE_NAME="${{ env.original_name }}"
          FILE_SIZE=$(stat -c %s downloaded_file)
          HALF_SIZE=$(( (FILE_SIZE + 1) / 2 ))   # 大致一半

          echo "文件大小 ≈ $((FILE_SIZE / 1024 / 1024)) MB，每份约 $((HALF_SIZE / 1024 / 1024)) MB"

          # 使用 zip 原生分卷 + 强制分成两份（通过设置分卷大小接近一半）
          zip -9 -s ${HALF_SIZE}b "${BASE_NAME}.zip" downloaded_file

          # zip 分卷会自动生成 .zip + .z01
          ls -lh "${BASE_NAME}.zip" "${BASE_NAME}.z01" 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "2-Part ZIP - ${{ inputs.release_tag }}"
          draft: false
          prerelease: false
          files: |
            *.zip
            *.z01
          token: ${{ secrets.GITHUB_TOKEN }}
