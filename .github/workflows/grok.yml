name: Download WHL → ZIP → Release

on:
  workflow_dispatch:
    inputs:
      pip_command:
        description: 'pip download 的参数（例如：numpy pandas 或 torch --extra-index-url ...）'
        required: true
        default: 'numpy'
      release_tag:
        description: 'Release 的 Tag 名称（例如 v1.0 或 20250501）'
        required: true
        default: 'whl-download-$(date +%Y%m%d)'
      release_name:
        description: 'Release 显示名称（可选）'
        required: false
        default: 'WHL 下载包'

jobs:
  download-and-package:
    runs-on: windows-11   # 或 windows-latest（推荐）
    # runs-on: windows-2025   # 如果想用最新的 Windows Server 2025 镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Upgrade pip and install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade wheel setuptools

      - name: Create download directory
        run: mkdir download

      - name: Run pip download
        run: |
          python -m pip download ${{ inputs.pip_command }} -d ./download
        shell: pwsh

      - name: List downloaded files
        run: dir .\download
        shell: pwsh

      - name: Package into ZIP
        run: |
          $tag = "${{ inputs.release_tag }}"
          $zipName = "whl-packages-${tag}.zip"
          Compress-Archive -Path .\download\* -DestinationPath $zipName -Force
          echo "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ${{ env.ZIP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}