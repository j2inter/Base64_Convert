name: Industrial Data Porter (Full Options)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 下载链接 (用分号分隔)'
        required: true
        type: string
      output_name:
        description: '📛 自定义保存文件名 (留空则使用原始名称，建议改名以躲避防火墙)'
        required: false
        type: string
      split_size_mb:
        description: '📦 分卷大小 (单位: MB，自动卡位 2GB 极限)'
        required: true
        default: '2000'
      compression_level:
        description: '⚡ 压缩等级 (0为仅存储，1为极速压缩-建议选1以躲避DPI扫描)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
        default: '1'
      custom_tag:
        description: '🏷️ 自定义 Release 标签名称 (如 Qwen-v1.0)'
        required: false
        type: string
      http_proxy:
        description: '🌐 代理服务器 (可选，例如 http://proxy_ip:port)'
        required: false
        type: string

jobs:
  heavy-lifting:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Preparation
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo apt-get update && sudo apt-get install -y aria2 p7zip-full bc
          df -h /

      - name: Process & Execute
        id: engine
        env:
          all_proxy: ${{ inputs.http_proxy }}
        run: |
          mkdir -p dl_tmp output_folder
          
          # --- 1. 计算极限分卷大小 ---
          GH_LIMIT_BYTES=2147483647
          USER_MB=${{ inputs.split_size_mb }}
          CALC_BYTES=$(echo "scale=0; ($USER_MB * 1024 * 1024) / 1" | bc)
          [ "$CALC_BYTES" -ge "$GH_LIMIT_BYTES" ] && FINAL_BYTES="${GH_LIMIT_BYTES}b" || FINAL_BYTES="${CALC_BYTES}b"
          echo "final_split=$FINAL_BYTES" >> $GITHUB_OUTPUT

          # --- 2. 增强型并行下载 ---
          echo "${{ inputs.urls }}" | tr ',;' '\n' | xargs -I {} echo "{}" > list.txt
          aria2c -i list.txt -x 16 -s 16 -j 5 --all-proxy="${{ inputs.http_proxy }}" -d ./dl_tmp --summary-interval=10

          # --- 3. 核心加工逻辑 ---
          cd dl_tmp
          for file in *; do
            [ -f "$file" ] || continue
            
            # 文件名处理逻辑
            if [ -n "${{ inputs.output_name }}" ]; then
               EXTENSION="${file##*.}"
               FINAL_FILENAME="${{ inputs.output_name }}.${EXTENSION}"
            else
               FINAL_FILENAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')
            fi
            
            echo ">>> 加工目标: $FINAL_FILENAME (原名: $file)"
            
            # 生成 SHA256 校验 (这是工业自动化的灵魂)
            sha256sum "$file" > "../output_folder/${FINAL_FILENAME}.sha256"
            
            # 分卷处理
            # -mx=${{ inputs.compression_level }} 动态选择压缩比
            7z a -v$FINAL_BYTES -mx=${{ inputs.compression_level }} -mmt=on "../output_folder/${FINAL_FILENAME}.7z" "$file"
            
            rm -f "$file"
          done
          
          # 设定 Tag
          [ -z "${{ inputs.custom_tag }}" ] && TAG="Release-$(date +'%Y%m%d-%H%M')" || TAG="${{ inputs.custom_tag }}"
          echo "final_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.engine.outputs.final_tag }}
          name: "📦 ${{ steps.engine.outputs.final_tag }}"
          body: |
            ## 自动化任务报告
            - **文件分卷**: `${{ steps.engine.outputs.final_split }}`
            - **压缩等级**: `mx${{ inputs.compression_level }}`
            - **哈希校验**: 已生成 `.sha256` 文件，请合并后核对。
          files: output_folder/*
