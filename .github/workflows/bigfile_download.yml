name: Granular Data Porter (Monitored)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 下载链接 (用分号分隔)'
        required: true
        type: string
      output_name:
        description: '📛 自定义保存文件名 (如 Daily_Patch_01)'
        required: false
        type: string
      split_size_mb:
        description: '📦 分卷大小 (单位: MB，自动卡位 2GB 极限)'
        required: true
        default: '2048'
      compression_level:
        description: '⚡ 压缩等级 (0为仅存储，1为极速压缩)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
        default: '1'
      custom_tag:
        description: '🏷️ 自定义 Release 标签名称'
        required: false
        type: string

jobs:
  precision-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 0. Checkout Repository
        uses: actions/checkout@v4

      - name: 1. System Pre-flight & Audit
        run: |
          echo "🖥️ CPU 型号: $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
          echo "📊 [初始资源状态]"
          free -h | awk 'NR==2{print "内存: 已用 "$3" / 总计 "$2}'
          df -h / | awk 'NR==2{print "磁盘: 可用 "$4" / 总量 "$2}'
          echo "----------------------------------------"

      - name: 2. Disk Space Reclamation
        run: |
          echo "🧹 开始清理系统预装组件释放空间..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          echo "📊 [清理后资源状态]"
          df -h / | awk 'NR==2{print "磁盘: 可用 "$4" / 总量 "$2}'
          echo "----------------------------------------"

      - name: 3. Install Industrial Toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y aria2 p7zip-full bc sysstat
          echo "✅ 工具链安装完毕 (aria2, 7z, bc, sysstat)"

      - name: 4. Geometry Calculation (Split Limit)
        id: math
        run: |
          GH_LIMIT_BYTES=2147483647
          USER_MB=${{ inputs.split_size_mb }}
          CALC_BYTES=$(echo "scale=0; ($USER_MB * 1024 * 1024) / 1" | bc)
          
          if [ "$CALC_BYTES" -ge "$GH_LIMIT_BYTES" ]; then
            FINAL_BYTES="${GH_LIMIT_BYTES}b"
            echo "⚠️ 触发极限保护"
          else
            FINAL_BYTES="${CALC_BYTES}b"
          fi
          
          echo "final_split=$FINAL_BYTES" >> $GITHUB_OUTPUT
          echo "🎯 计算出的分卷字节: $FINAL_BYTES"

      - name: 5. Parallel Data Fetching (Download)
        run: |
          echo "📊 [下载前资源状态]"
          free -h | awk 'NR==2{print "内存: 已用 "$3}'
          df -h / | awk 'NR==2{print "磁盘: 可用 "$4}'
          
          mkdir -p dl_tmp output_folder
          echo "${{ inputs.urls }}" | tr ',;' '\n' | xargs -I {} echo "{}" > list.txt
          
          echo "🚀 开始拉取数据..."
          # 优化了大文件的分块大小 (-k 50M) 以适应 35GB 级别传输
          aria2c -i list.txt -x 16 -s 16 -j 5 -k 50M -d ./dl_tmp --summary-interval=15
          
          echo "📊 [下载后资源状态]"
          df -h / | awk 'NR==2{print "磁盘: 可用 "$4}'

      - name: 6. Checksum Generation (SHA256)
        run: |
          cd dl_tmp
          for file in *; do
            [ -f "$file" ] || continue
            if [ -n "${{ inputs.output_name }}" ]; then
               FINAL_FILENAME="${{ inputs.output_name }}.${file##*.}"
            else
               FINAL_FILENAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')
            fi
            
            echo "🔐 正在生成 $FINAL_FILENAME 的 SHA256 校验码..."
            sha256sum "$file" > "../output_folder/${FINAL_FILENAME}.sha256"
            
            # 将重命名映射保存，传给下一步
            mv "$file" "$FINAL_FILENAME"
          done

      - name: 7. 7-Zip Splitting Engine (CPU/IO Heavy)
        run: |
          echo "📊 [处理前资源状态]"
          free -h | awk 'NR==2{print "内存: 已用 "$3}'
          
          cd dl_tmp
          FINAL_BYTES="${{ steps.math.outputs.final_split }}"
          
          for file in *; do
            [ -f "$file" ] || continue
            echo "⚙️ 启动分卷切割: $file (模式: mx${{ inputs.compression_level }}, 大小: $FINAL_BYTES)"
            
            # 执行核心切割
            7z a -v$FINAL_BYTES -mx=${{ inputs.compression_level }} -mmt=on "../output_folder/${file}.7z" "$file"
            
            # 删除原文件释放空间
            rm -f "$file"
            echo "🗑️ 已清理原始文件，释放磁盘。"
          done
          
          echo "📊 [处理后资源状态]"
          df -h / | awk 'NR==2{print "磁盘: 可用 "$4}'

      - name: 8. Publish Release
        id: tagger
        run: |
          [ -z "${{ inputs.custom_tag }}" ] && TAG="Data-$(date +'%Y%m%d-%H%M')" || TAG="${{ inputs.custom_tag }}"
          echo "final_tag=$TAG" >> $GITHUB_OUTPUT
          
      - name: 9. Upload to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.final_tag }}
          name: "📦 ${{ steps.tagger.outputs.final_tag }}"
          body: |
            ### 数据交付凭证
            - **区块大小**: `${{ steps.math.outputs.final_split }}`
            - **压缩等级**: `mx${{ inputs.compression_level }}`
          files: output_folder/*
