name: Extreme Precision MB Splitter

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '下载链接 (用逗号或分号分隔)'
        required: true
        type: string
      split_size_mb:
        description: '每个分卷的大小 (单位: MB，支持小数，如 2000 或 2047.9)'
        required: true
        default: '2048'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Audit & Clean
        run: |
          echo "=== CPU: $(lscpu | grep 'Model name' | cut -d: -f2 | xargs) ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          echo "清理后可用空间："
          df -h /

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y aria2 p7zip-full bc

      - name: Download & Byte-Level Split
        id: worker
        run: |
          mkdir -p dl_tmp output_folder
          
          # --- 极限字节计算逻辑 ---
          # GitHub 极限是 2^31 字节 (2147483648)，我们必须严格小于它
          GH_LIMIT_BYTES=2147483647
          
          # 提取用户输入的数字（过滤掉可能误输入的单位）
          USER_INPUT=$(echo "${{ inputs.split_size_mb }}" | grep -oE '[0-9]+(\.[0-9]+)?')
          
          # 使用 bc 将 MB 转换为 Bytes (1 MB = 1024 * 1024 Bytes)
          # scale=0 确保结果是整数字节
          CALC_BYTES=$(echo "scale=0; ($USER_INPUT * 1024 * 1024) / 1" | bc)
          
          # 比较并卡位
          if [ "$CALC_BYTES" -ge "$GH_LIMIT_BYTES" ]; then
            FINAL_BYTES="${GH_LIMIT_BYTES}b"
            echo "⚠️ 输入已达极限，自动修正为: $FINAL_BYTES"
          else
            FINAL_BYTES="${CALC_BYTES}b"
            echo "✅ 设定分卷大小为: $FINAL_BYTES"
          fi
          echo "safe_size_bytes=$FINAL_BYTES" >> $GITHUB_OUTPUT

          # --- 并行下载 ---
          echo "${{ inputs.urls }}" | tr ',;' '\n' | xargs -I {} echo "{}" > list.txt
          aria2c -i list.txt -x 16 -s 16 -j 5 -d ./dl_tmp --summary-interval=10

          # --- 批量处理 ---
          cd dl_tmp
          for file in *; do
            [ -f "$file" ] || continue
            SAFE_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # 生成哈希校验，防止大文件传输损坏
            sha256sum "$file" > "../output_folder/${SAFE_NAME}.sha256"
            
            # 使用计算出的精确字节数进行分卷
            
            7z a -v$FINAL_BYTES -mx1 -mmt=on "../output_folder/${SAFE_NAME}.7z" "$file"
            
            rm -f "$file"
          done
          
          echo "tag_prefix=$(ls ../output_folder/ | grep '.7z' | head -n 1 | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.worker.outputs.tag_prefix }}-${{ github.run_id }}
          name: "🚀 Precision Release [${{ steps.worker.outputs.safe_size_bytes }}]"
          body: |
            **分卷详情**
            - 设定大小: `${{ inputs.split_size_mb }} MB`
            - 实际字节: `${{ steps.worker.outputs.safe_size_bytes }}`
            - 模式: 仅存储 (Store)
          files: output_folder/*
