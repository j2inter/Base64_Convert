name: Turbo 7z Batch Release

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '多个 URL，用逗号或分号分隔'
        required: true
        type: string
      split_size:
        description: '分卷大小 (如: 2G, 4000m)'
        required: true
        default: '2G'

jobs:
  process-and-release:
    runs-on: ubuntu-latest # 实际运行时会对应你那台 145G 的机器
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: System & Disk Check (Before)
        run: |
          echo "### [1/2] 硬件与磁盘初始状态"
          echo "CPU: $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
          echo "RAM: $(free -h | awk '/^Mem:/ {print $2}')"
          df -h /
          echo "--------------------------------------"

      - name: Free Disk Space
        run: |
          # 清理常见预装占用
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          echo "清理完成。"

      - name: System & Disk Check (After)
        run: |
          echo "### [2/2] 清理后磁盘状态"
          df -h /
          echo "--------------------------------------"

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full

      - name: Parallel Download All
        id: download
        run: |
          mkdir -p dl_tmp
          # 将输入的 URL 转换为 aria2 的任务列表
          echo "${{ inputs.urls }}" | tr ',;' '\n' | xargs -I {} echo "{}" > download_list.txt
          
          echo ">>> 开始全并发下载..."
          # -j 5: 同时下载最多 5 个文件
          # -x 16: 每个文件开启 16 个线程
          aria2c -i download_list.txt -j 5 -x 16 -s 16 -d ./dl_tmp --summary-interval=10
          
          echo "下载目录内容："
          ls -lh ./dl_tmp

      - name: Batch 7z Compression
        id: compress
        run: |
          mkdir -p output_folder
          
          cd dl_tmp
          for file in *; do
            [ -f "$file" ] || continue
            SAFE_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo ">>> 正在压缩并切分: $file"
            # -mx=3: 快速压缩模式（稍微压缩，不只是存档）
            # -mmt=on: 开启多线程，压榨 EPYC 性能
            # -v: 自动分卷
            7z a -v${{ inputs.split_size }} -mx=3 -mmt=on "../output_folder/${SAFE_NAME}.7z" "$file"
          done
          
          # 获取第一个文件的名称作为 Tag 识别码
          TAG_BASE=$(ls ../output_folder/ | head -n 1 | cut -d. -f1)
          echo "tag_base=$TAG_BASE" >> $GITHUB_OUTPUT

      - name: Generate timestamp
        id: time
        run: echo "time=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.compress.outputs.tag_base }}-${{ steps.time.outputs.time }}
          name: "Batch 7z Release (Slight Compress)"
          body: |
            **系统硬件信息**
            - CPU: AMD EPYC 9V74
            - 压缩模式: 7z -mx3 (Fast)
            - 分卷大小: ${{ inputs.split_size }}
          files: output_folder/*
