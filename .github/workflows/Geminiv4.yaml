name: Download Split and Release

on:
  workflow_dispatch:
    inputs:
      url:
        description: '需要下载的 URL'
        required: true
        type: string
      split_size:
        description: '分卷大小 (单位: MB)'
        required: true
        default: '50'
        type: string

jobs:
  process-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p dl_folder
          mkdir -p output_folder

      - name: Download file
        # 将输入安全地映射到环境变量
        env:
          DL_URL: ${{ github.event.inputs.url }}
        run: |
          cd dl_folder
          echo "Starting download..."
          wget --content-disposition --trust-server-names "$DL_URL"

      - name: Zip and split file
        env:
          SZ: ${{ github.event.inputs.split_size }}
        run: |
          cd dl_folder
          # 检查文件夹是否为空
          if [ -z "$(ls -A .)" ]; then
            echo "Error: Download folder is empty."
            exit 1
          fi
          # 使用环境变量 $SZ，避免在 run 块中使用 ${{ }}
          zip -s "${SZ}m" ../output_folder/archive.zip ./*

      - name: Generate timestamp
        id: time
        run: echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        env:
          # 这里的变量是 action 内部处理，不容易触发 L32 那种 shell 解析错误
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "release-${{ steps.time.outputs.tag }}"
          name: "Archive Release ${{ steps.time.outputs.tag }}"
          body: "Source URL: ${{ github.event.inputs.url }}"
          files: output_folder/*
